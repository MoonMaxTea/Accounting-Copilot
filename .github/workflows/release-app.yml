name: Release Desktop App

on:
  workflow_dispatch:
  push:
    tags:
      - 'app-v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev pkg-config

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Build shared workspace packages
        run: pnpm --filter @asd/shared-types build

      - name: Run tests
        run: pnpm test

      - name: Build desktop app
        run: pnpm app:build

      - name: Publish Linux assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/src-tauri/target/release/bundle/deb/*.deb
            app/src-tauri/target/release/bundle/appimage/*.AppImage

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Build shared workspace packages
        run: pnpm --filter @asd/shared-types build

      - name: Run tests
        run: pnpm test

      - name: Run Rust tests
        run: cd app/src-tauri && cargo test

      - name: Build desktop app
        run: pnpm app:build

      - name: Publish Windows assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/src-tauri/target/release/bundle/nsis/*-setup.exe
            app/src-tauri/target/release/bundle/msi/*.msi
